    <div id="flip-container">
      <div id="flip-inner">
        <!-- FRONT: Sign In -->
        <div id="signin" class="flip-front">
          <form id="sign-in-form">
            <h2 id="title">Sign in</h2>
            <p id="login-p">Welcome back! Please login to continue browsing.</p>
            <p id="error-message"></p>
            <div id="input-field">
              <a class="iconss"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5"
                  ></path></svg
              ></a>
              <input
                id="username"
                class="field"
                type="text"
                placeholder="Username"
              />
            </div>
            <div id="input-field">
              <a class="iconss"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"
                  ></path></svg
              ></a>
              <input
                id="password"
                class="field"
                type="password"
                placeholder="Password"
              />
            </div>
            <input type="submit" value="Login" id="login-btn" />
          </form>
          <p>
            Don't have an account?
            <a href="#" id="sign-up-link" onclick="flipTo('signup')">Sign up</a>
          </p>
        </div>

        <!-- BACK: Sign Up -->
        <div id="signup" class="flip-back">
          <form id="sign-up-form">
            <h2 id="title">Sign up</h2>
            <p id="login-p">
              Welcome! Please fill in the details to create an account.
            </p>
            <p id="error-message-signup"></p>
            <div id="input-field">
              <a class="iconss"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M12 12c2.76 0 5-2.24 5-5s-2.24-5-5-5-5 2.24-5 5 2.24 5 5 5m0-8c1.65 0 3 1.35 3 3s-1.35 3-3 3-3-1.35-3-3 1.35-3 3-3M4 22h16c.55 0 1-.45 1-1v-1c0-3.86-3.14-7-7-7h-4c-3.86 0-7 3.14-7 7v1c0 .55.45 1 1 1m6-7h4c2.76 0 5 2.24 5 5H5c0-2.76 2.24-5 5-5"

              ></a>
              <input
                id="new-username"
                class="field"
                type="text"
                placeholder="Username"
              />

            <div id="input-field">
              <a class="iconss"

                  xmlns="http://www.w3.org/2000/svg"

                  ></path></svg
              ></a>
              <input
                id="new-email"
                class="field"
                type="text"
                placeholder="Email"
              />
            </div>
            <div id="input-field">
              <a class="iconss"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"

                    d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"
                  ></path></svg
              ></a>
              <input
                id="new-password"
                class="field"
                type="password"
                placeholder="Password"
              />
            </div>
            <div id="input-field">
              <a class="iconss"
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    d="M6 22h12c1.1 0 2-.9 2-2v-9c0-1.1-.9-2-2-2h-1V7c0-2.76-2.24-5-5-5S7 4.24 7 7v2H6c-1.1 0-2 .9-2 2v9c0 1.1.9 2 2 2M9 7c0-1.65 1.35-3 3-3s3 1.35 3 3v2H9zm-3 4h12v9H6z"
                  ></path></svg
              ></a>
              <input

                class="field"
                type="password"
                placeholder="Confirm Password"
              />

            <input type="submit" value="Create Account" id="login-btn" />
          </form>
          <p>
            Already have an account?
            <a href="#" id="sign-up-link" onclick="flipTo('signin')">Sign in</a>
          </p>
        </div>
      </div>

</html>
